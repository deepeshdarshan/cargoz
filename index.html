<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CargoZ - Find Your Perfect Warehouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="cgz-hero-section">
    <h1>Find your perfect warehouse. We offer many warehouses to choose from.</h1>
  </div>

  <div class="cgz-search-card">
    <form class="cgz-search-form" id="cgz-warehouseSearchForm">

      <!-- Location Dropdown -->
      <div class="cgz-form-group">
        <label>Where do you want to store?</label>
        <div class="cgz-input-wrapper">
          <span class="cgz-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
            </svg>
          </span>
          <select id="cgz-location" name="location">
            <!-- Populated dynamically from MAIN_LOCATIONS -->
          </select>
          <span class="cgz-select-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 15.75 3.75-3.75 3.75 3.75m-7.5-6 3.75-3.75 3.75 3.75" />
            </svg>
          </span>
        </div>
      </div>

      <!-- Type of Storage Dropdown -->
      <div class="cgz-form-group">
        <label>Type of Storage</label>
        <div class="cgz-input-wrapper">
          <span class="cgz-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3H21m-3.75 3H21" />
            </svg>
          </span>
          <select id="cgz-storageType" name="storageType" onchange="updateUnit()">
            <option value="">All Types</option>
            <option value="SQFT">Store by Area (SQFT)</option>
            <option value="SQM">Store by Area (SQM)</option>
            <option value="Pallet">Pallet</option>
          </select>
          <span class="cgz-select-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 15.75 3.75-3.75 3.75 3.75m-7.5-6 3.75-3.75 3.75 3.75" />
            </svg>
          </span>
        </div>
      </div>

      <!-- Required Area Input (hidden by default when "All Types" is selected) -->
      <div class="cgz-form-group" id="cgz-areaGroup" style="display: none;">
        <label id="cgz-areaLabel">Required Area</label>
        <div class="cgz-area-input-group">
          <span class="cgz-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.429 9.75 2.25 12l4.179 2.25m0-4.5 5.571 3 5.571-3m-11.142 0L2.25 7.5 12 2.25l9.75 5.25-4.179 2.25m0 0L12 12.75l-5.571-3m11.142 0 4.179 2.25L12 17.25l-9.75-5.25 4.179-2.25" />
            </svg>
          </span>
          <input
            type="number"
            id="cgz-areaValue"
            name="areaValue"
            placeholder=""
            min="0"
            step="any"
          />
          <span class="cgz-unit-badge" id="cgz-unitBadge">SQFT</span>
        </div>
      </div>

      <!-- Search Button -->
      <button type="submit" class="cgz-search-btn" id="cgz-searchBtn"><span class="cgz-btn-spinner"></span>Search</button>
    </form>
  </div>

  <!-- Two-Column Layout: Filter Sidebar + Results -->
  <div class="cgz-content-area" id="cgz-contentArea" style="display: none;">

    <!-- Filter Sidebar -->
    <aside class="cgz-filter-sidebar">
      <div class="cgz-filter-title">Filter By</div>

      <!-- Filter sections — bodies populated dynamically from constants.js -->
      <div class="cgz-filter-section" data-filter="filterLocation">
        <div class="cgz-filter-header" onclick="toggleFilter(this)">
          <h4>Location</h4>
          <svg class="cgz-filter-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <div class="cgz-filter-body" id="cgz-filterLocationBody"></div>
      </div>

      <div class="cgz-filter-section" data-filter="filterCargoType">
        <div class="cgz-filter-header" onclick="toggleFilter(this)">
          <h4>Cargo Type</h4>
          <svg class="cgz-filter-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <div class="cgz-filter-body" id="cgz-filterCargoTypeBody"></div>
      </div>

      <div class="cgz-filter-section" data-filter="filterStorageType">
        <div class="cgz-filter-header" onclick="toggleFilter(this)">
          <h4>Storage Type</h4>
          <svg class="cgz-filter-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <div class="cgz-filter-body" id="cgz-filterStorageTypeBody"></div>
      </div>

      <div class="cgz-filter-section" data-filter="filterTemperature">
        <div class="cgz-filter-header" onclick="toggleFilter(this)">
          <h4>Temperature</h4>
          <svg class="cgz-filter-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <div class="cgz-filter-body" id="cgz-filterTemperatureBody"></div>
      </div>

      <div class="cgz-filter-section" data-filter="filterStarRating">
        <div class="cgz-filter-header" onclick="toggleFilter(this)">
          <h4>Star Rating</h4>
          <svg class="cgz-filter-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <div class="cgz-filter-body" id="cgz-filterStarRatingBody"></div>
      </div>

    </aside>

    <!-- Results Section -->
    <div class="cgz-results-section" id="cgz-resultsSection">
      <div class="cgz-results-header">
        <h2 id="cgz-resultsTitle">UAE: Top picks for you</h2>
        <div class="cgz-sort-wrapper">
          <span>Sort by:</span>
          <select id="cgz-sortBy" onchange="applySortAndRender()">
            <option value="capacity-desc">Capacity - High to Low</option>
            <option value="capacity-asc">Capacity - Low to High</option>
            <option value="name-asc">Name - A to Z</option>
            <option value="name-desc">Name - Z to A</option>
          </select>
        </div>
      </div>
      <div id="cgz-warehouseList"></div>
      <div class="cgz-pagination" id="cgz-paginationControls"></div>
    </div>

  </div>

  <script type="module">
    import { init } from './warehouse-service.js';
    init();
  </script>

</body>
</html>
