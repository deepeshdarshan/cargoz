<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CargoZ - Find Your Perfect Warehouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="hero-section">
    <h1>Find your perfect warehouse. We offer many warehouses to choose from.</h1>
  </div>

  <div class="search-card">
    <form class="search-form" id="warehouseSearchForm">

      <!-- Location Dropdown -->
      <div class="form-group">
        <label>Where do you want to store?</label>
        <div class="input-wrapper">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
            </svg>
          </span>
          <select id="location" name="location">
            <option value="uae">UAE</option>
            <option value="abu dhabi">Abu Dhabi</option>
            <option value="saudi arabia">Saudi Arabia</option>
            <option value="qatar">Qatar</option>
            <option value="bahrain">Bahrain</option>
            <option value="kuwait">Kuwait</option>
            <option value="oman">Oman</option>
            <option value="jordan">Jordan</option>
            <option value="iraq">Iraq</option>
            <option value="lebanon">Lebanon</option>
          </select>
          <span class="select-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 15.75 3.75-3.75 3.75 3.75m-7.5-6 3.75-3.75 3.75 3.75" />
            </svg>
          </span>
        </div>
      </div>

      <!-- Type of Storage Dropdown -->
      <div class="form-group">
        <label>Type of Storage</label>
        <div class="input-wrapper">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3H21m-3.75 3H21" />
            </svg>
          </span>
          <select id="storageType" name="storageType" onchange="updateUnit()">
            <option value="">All Types</option>
            <option value="SQFT">Store by Area (SQFT)</option>
            <option value="CBM">Store by Volume (CBM)</option>
            <option value="Pallet">Pallet</option>
          </select>
          <span class="select-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 15.75 3.75-3.75 3.75 3.75m-7.5-6 3.75-3.75 3.75 3.75" />
            </svg>
          </span>
        </div>
      </div>

      <!-- Required Area Input (hidden by default when "All Types" is selected) -->
      <div class="form-group" id="areaGroup" style="display: none;">
        <label id="areaLabel">Required Area</label>
        <div class="area-input-group">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.429 9.75 2.25 12l4.179 2.25m0-4.5 5.571 3 5.571-3m-11.142 0L2.25 7.5 12 2.25l9.75 5.25-4.179 2.25m0 0L12 12.75l-5.571-3m11.142 0 4.179 2.25L12 17.25l-9.75-5.25 4.179-2.25" />
            </svg>
          </span>
          <input
            type="number"
            id="areaValue"
            name="areaValue"
            placeholder=""
            min="0"
            step="any"
          />
          <span class="unit-badge" id="unitBadge">SQFT</span>
        </div>
      </div>

      <!-- Search Button -->
      <button type="submit" class="search-btn" id="searchBtn"><span class="btn-spinner"></span>Search</button>
    </form>
  </div>

  <!-- Two-Column Layout: Filter Sidebar + Results -->
  <div class="content-area" id="contentArea" style="display: none;">

    <!-- Filter Sidebar -->
    <aside class="filter-sidebar">
      <div class="filter-title">Filter By</div>

      <!-- Location Filter -->
      <div class="filter-section" data-filter="filterLocation">
        <div class="filter-header" onclick="toggleFilter(this)">
          <h4>Location</h4>
          <svg class="filter-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <div class="filter-body">
          <div class="filter-option"><input type="checkbox" id="loc-alqusais" data-group="filterLocation" value="Al Qusais" onchange="applyFilters()"><label for="loc-alqusais">Al Qusais</label></div>
          <div class="filter-option"><input type="checkbox" id="loc-alquoz" data-group="filterLocation" value="Al Quoz" onchange="applyFilters()"><label for="loc-alquoz">Al Quoz</label></div>
          <div class="filter-option"><input type="checkbox" id="loc-jafza" data-group="filterLocation" value="Jafza" onchange="applyFilters()"><label for="loc-jafza">Jafza</label></div>
          <div class="filter-option"><input type="checkbox" id="loc-ummramool" data-group="filterLocation" value="Umm Ramool" onchange="applyFilters()"><label for="loc-ummramool">Umm Ramool</label></div>
          <div class="filter-option"><input type="checkbox" id="loc-dip" data-group="filterLocation" value="DIP1 & DIP2" onchange="applyFilters()"><label for="loc-dip">DIP1 &amp; DIP2</label></div>
          <div class="filter-option"><input type="checkbox" id="loc-dic" data-group="filterLocation" value="Dubai Industrial City" onchange="applyFilters()"><label for="loc-dic">Dubai Industrial City</label></div>
          <div class="filter-option"><input type="checkbox" id="loc-rak" data-group="filterLocation" value="Rass Al Khor" onchange="applyFilters()"><label for="loc-rak">Rass Al Khor</label></div>
          <div class="filter-option"><input type="checkbox" id="loc-ic" data-group="filterLocation" value="International City" onchange="applyFilters()"><label for="loc-ic">International City</label></div>
          <div class="filter-option"><input type="checkbox" id="loc-jaia" data-group="filterLocation" value="Jebal Ali Industrial Area" onchange="applyFilters()"><label for="loc-jaia">Jebal Ali Industrial Area</label></div>
          <div class="filter-option"><input type="checkbox" id="loc-dmcc" data-group="filterLocation" value="DMCC" onchange="applyFilters()"><label for="loc-dmcc">DMCC</label></div>
          <div class="filter-option"><input type="checkbox" id="loc-ruwayyah" data-group="filterLocation" value="Al Ruwayyah" onchange="applyFilters()"><label for="loc-ruwayyah">Al Ruwayyah</label></div>
        </div>
      </div>

      <!-- Cargo Type Filter -->
      <div class="filter-section" data-filter="filterCargoType">
        <div class="filter-header" onclick="toggleFilter(this)">
          <h4>Cargo Type</h4>
          <svg class="filter-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <div class="filter-body">
          <div class="filter-option"><input type="checkbox" id="cargo-general" data-group="filterCargoType" value="General Cargo" onchange="applyFilters()"><label for="cargo-general">General Cargo</label></div>
          <div class="filter-option"><input type="checkbox" id="cargo-food" data-group="filterCargoType" value="Food and Beverages" onchange="applyFilters()"><label for="cargo-food">Food and Beverages</label></div>
          <div class="filter-option"><input type="checkbox" id="cargo-dangerous" data-group="filterCargoType" value="Dangerous Goods" onchange="applyFilters()"><label for="cargo-dangerous">Dangerous Goods</label></div>
          <div class="filter-option"><input type="checkbox" id="cargo-chemicals" data-group="filterCargoType" value="Chemicals" onchange="applyFilters()"><label for="cargo-chemicals">Chemicals</label></div>
          <div class="filter-option"><input type="checkbox" id="cargo-medical" data-group="filterCargoType" value="Medical" onchange="applyFilters()"><label for="cargo-medical">Medical</label></div>
          <div class="filter-option"><input type="checkbox" id="cargo-pharma" data-group="filterCargoType" value="Pharma" onchange="applyFilters()"><label for="cargo-pharma">Pharma</label></div>
        </div>
      </div>

      <!-- Storage Type Filter -->
      <div class="filter-section" data-filter="filterStorageType">
        <div class="filter-header" onclick="toggleFilter(this)">
          <h4>Storage Type</h4>
          <svg class="filter-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <div class="filter-body">
          <div class="filter-option"><input type="checkbox" id="st-bulk" data-group="filterStorageType" value="Bulk Space" onchange="applyFilters()"><label for="st-bulk">Bulk Space</label></div>
          <div class="filter-option"><input type="checkbox" id="st-rack" data-group="filterStorageType" value="Rack Space" onchange="applyFilters()"><label for="st-rack">Rack Space</label></div>
          <div class="filter-option"><input type="checkbox" id="st-individual" data-group="filterStorageType" value="Individual Unit" onchange="applyFilters()"><label for="st-individual">Individual Unit</label></div>
          <div class="filter-option"><input type="checkbox" id="st-lockable" data-group="filterStorageType" value="Lockable Unit" onchange="applyFilters()"><label for="st-lockable">Lockable Unit</label></div>
          <div class="filter-option"><input type="checkbox" id="st-cage" data-group="filterStorageType" value="Cage" onchange="applyFilters()"><label for="st-cage">Cage</label></div>
          <div class="filter-option"><input type="checkbox" id="st-openyard" data-group="filterStorageType" value="Open Yard" onchange="applyFilters()"><label for="st-openyard">Open Yard</label></div>
          <div class="filter-option"><input type="checkbox" id="st-closedyard" data-group="filterStorageType" value="Closed Yard" onchange="applyFilters()"><label for="st-closedyard">Closed Yard</label></div>
        </div>
      </div>

      <!-- Temperature Filter -->
      <div class="filter-section" data-filter="filterTemperature">
        <div class="filter-header" onclick="toggleFilter(this)">
          <h4>Temperature</h4>
          <svg class="filter-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <div class="filter-body">
          <div class="filter-option"><input type="checkbox" id="temp-ac" data-group="filterTemperature" value="Air Conditioned" onchange="applyFilters()"><label for="temp-ac">Air Conditioned</label></div>
          <div class="filter-option"><input type="checkbox" id="temp-nonac" data-group="filterTemperature" value="Non-Air Conditioned" onchange="applyFilters()"><label for="temp-nonac">Non-Air Conditioned</label></div>
          <div class="filter-option"><input type="checkbox" id="temp-ambient" data-group="filterTemperature" value="Ambient" onchange="applyFilters()"><label for="temp-ambient">Ambient (21°C to 25°C)</label></div>
          <div class="filter-option"><input type="checkbox" id="temp-chilled" data-group="filterTemperature" value="Chilled Storage" onchange="applyFilters()"><label for="temp-chilled">Chilled Storage (1°C to 5°C)</label></div>
          <div class="filter-option"><input type="checkbox" id="temp-cold" data-group="filterTemperature" value="Cold Storage" onchange="applyFilters()"><label for="temp-cold">Cold Storage (-18°C to 0°C)</label></div>
          <div class="filter-option"><input type="checkbox" id="temp-frozen" data-group="filterTemperature" value="Frozen" onchange="applyFilters()"><label for="temp-frozen">Frozen (-30°C to -17°C)</label></div>
          <div class="filter-option"><input type="checkbox" id="temp-cool" data-group="filterTemperature" value="Cool Storage" onchange="applyFilters()"><label for="temp-cool">Cool Storage (6°C to 20°C)</label></div>
          <div class="filter-option"><input type="checkbox" id="temp-open" data-group="filterTemperature" value="Open Area" onchange="applyFilters()"><label for="temp-open">Open Area</label></div>
        </div>
      </div>

      <!-- Star Rating Filter -->
      <div class="filter-section" data-filter="filterStarRating">
        <div class="filter-header" onclick="toggleFilter(this)">
          <h4>Star Rating</h4>
          <svg class="filter-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <div class="filter-body">
          <div class="filter-option">
            <input type="checkbox" id="star-5" data-group="filterStarRating" value="5" onchange="applyFilters()">
            <label for="star-5" class="star-row"><span class="stars"><svg class="star-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg><svg class="star-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg><svg class="star-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg><svg class="star-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg><svg class="star-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg></span></label>
          </div>
          <div class="filter-option">
            <input type="checkbox" id="star-4" data-group="filterStarRating" value="4" onchange="applyFilters()">
            <label for="star-4" class="star-row"><span class="stars"><svg class="star-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg><svg class="star-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg><svg class="star-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg><svg class="star-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg><svg class="star-icon empty" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg></span></label>
          </div>
          <div class="filter-option">
            <input type="checkbox" id="star-3" data-group="filterStarRating" value="3" onchange="applyFilters()">

  <!-- Single module script: constants, UI helpers, Firebase integration -->
  <script type="module">
    import { CONVERSION_TO_SQFT, UNIT_LABELS, VALIDATION_LABELS } from './constants.js';
    import { searchByLocation, filterByCapacity } from './warehouse-service.js';

    // ── State ──
    let currentResults = [];
    let currentStorageType = 'SQFT';

    // ── UI Helper Functions ──

    function updateUnit() {
      const storageType = document.getElementById('storageType').value;
      const unitBadge = document.getElementById('unitBadge');
      const areaLabel = document.getElementById('areaLabel');
      const areaGroup = document.getElementById('areaGroup');
      const areaInput = document.getElementById('areaValue');

      if (!storageType) {
        areaGroup.style.display = 'none';
        areaInput.value = '';
      } else {
        areaGroup.style.display = '';

        if (storageType === 'SQFT') {
          unitBadge.textContent = 'SQFT';
          areaLabel.textContent = 'Required Area';
        } else if (storageType === 'CBM') {
          unitBadge.textContent = 'CBM';
          areaLabel.textContent = 'Required Volume';
        } else if (storageType === 'Pallet') {
          unitBadge.textContent = 'Pallets';
          areaLabel.textContent = 'No. of Pallets';
        }
      }
    }

    function showLoading() {
      document.getElementById('contentArea').style.display = 'flex';
      const list = document.getElementById('warehouseList');
      list.innerHTML = `
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Searching warehouses...</p>
        </div>`;
    }

    // ── Filter Sidebar Logic ──

    function resetFilters() {
      document.querySelectorAll('.filter-sidebar input[type="checkbox"]').forEach(cb => {
        cb.checked = false;
      });
    }

    function toggleFilter(headerEl) {
      const section = headerEl.closest('.filter-section');
      section.classList.toggle('collapsed');
    }

    function getCheckedValues(group) {
      const checkboxes = document.querySelectorAll(`input[data-group="${group}"]:checked`);
      return Array.from(checkboxes).map(cb => cb.value.toLowerCase());
    }

    function applyFilters() {
      const selectedLocations = getCheckedValues('filterLocation');
      const selectedCargoTypes = getCheckedValues('filterCargoType');
      const selectedStorageTypes = getCheckedValues('filterStorageType');
      const selectedTemperatures = getCheckedValues('filterTemperature');
      const selectedStarRatings = getCheckedValues('filterStarRating').map(Number);

      const filtered = currentResults.filter(wh => {
        if (selectedLocations.length > 0) {
          const whArea = (wh['sub-location'] || wh.area || '').toLowerCase();
          if (!selectedLocations.some(loc => whArea.includes(loc))) return false;
        }

        if (selectedCargoTypes.length > 0) {
          const whCargo = (wh['cargo-type'] || wh.cargoType || '').toLowerCase();
          if (!selectedCargoTypes.some(ct => whCargo.includes(ct))) return false;
        }

        if (selectedStorageTypes.length > 0) {
          const whStorage = (wh['storage-type'] || wh.storageType || '').toLowerCase();
          if (!selectedStorageTypes.some(st => whStorage.includes(st))) return false;
        }

        if (selectedTemperatures.length > 0) {
          const whTemp = (wh.temperature || '').toLowerCase();
          if (!selectedTemperatures.some(t => whTemp === t)) return false;
        }

        if (selectedStarRatings.length > 0) {
          const whRating = parseInt(wh['star-rating'] || wh.starRating || 0);
          if (!selectedStarRatings.includes(whRating)) return false;
        }

        return true;
      });

      const sortBy = document.getElementById('sortBy').value;
      const sorted = [...filtered];

      if (sortBy === 'capacity-desc') {
        sorted.sort((a, b) => (parseFloat(b.capacity) || 0) - (parseFloat(a.capacity) || 0));
      } else if (sortBy === 'capacity-asc') {
        sorted.sort((a, b) => (parseFloat(a.capacity) || 0) - (parseFloat(b.capacity) || 0));
      } else if (sortBy === 'name-asc') {
        sorted.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      } else if (sortBy === 'name-desc') {
        sorted.sort((a, b) => (b.name || '').localeCompare(a.name || ''));
      }

      renderWarehouses(sorted, currentStorageType);
    }

    function showEmpty(location) {
      const list = document.getElementById('warehouseList');
      list.innerHTML = `
        <div class="empty-state">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
          </svg>
          <p>No warehouses found in <strong>${location}</strong> matching your criteria.</p>
        </div>`;
    }

    function displayCapacity(sqftValue, storageType) {
      const factor = CONVERSION_TO_SQFT[storageType] || 1;
      const converted = sqftValue / factor;
      if (storageType === 'Pallet') return Math.floor(converted).toLocaleString();
      if (storageType === 'CBM') return converted.toFixed(1);
      return Math.round(converted).toLocaleString();
    }

    function renderWarehouses(warehouses, storageType) {
      const list = document.getElementById('warehouseList');
      const unit = UNIT_LABELS[storageType] || 'SQFT';

      if (warehouses.length === 0) {
        const location = document.getElementById('location').value;
        showEmpty(location);
        return;
      }

      list.innerHTML = warehouses.map((wh) => {
        const capacitySqft = parseFloat(wh.capacity) || 0;
        const displayCap = displayCapacity(capacitySqft, storageType);
        const imageUrl = wh.imageUrl || wh['image-url'] || '';
        const name = wh.name || wh.id;
        const location = wh.location || '';
        const area = wh.area || '';
        const cargoType = wh.cargoType || '';
        const whStorageType = wh.storageType || '';
        const temperature = wh.temperature || '';
        const starRating = parseInt(wh.starRating || 0);

        const imageHtml = imageUrl
          ? `<img src="${imageUrl}" alt="${name}" />`
          : `<div class="no-image">
               <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.2" stroke="currentColor">
                 <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3H21m-3.75 3H21" />
               </svg>
             </div>`;

        let starsHtml = '';
        for (let i = 1; i <= 5; i++) {
          starsHtml += i <= starRating
            ? '<svg class="star-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>'
            : '<svg class="star-icon empty" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>';
        }

        const locationDisplay = area
          ? `${area}, ${location.charAt(0).toUpperCase() + location.slice(1)}`
          : location.toUpperCase();

        return `
          <div class="warehouse-card">
            <div class="card-image">${imageHtml}</div>
            <div class="card-body">
              <div class="card-info">
                <h3 style="display:inline-flex;align-items:center;gap:0.4rem;">${name} ${starRating > 0 ? `<span class="stars">${starsHtml}</span>` : ''}</h3>
                <div class="card-location">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
                  </svg>
                  ${locationDisplay}
                </div>
                <div class="card-tags">
                  ${cargoType ? `<span class="tag">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z" />
                    </svg>
                    ${cargoType}
                  </span>` : ''}
                  ${whStorageType ? `<span class="tag">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3H21m-3.75 3H21" />
                    </svg>
                    ${whStorageType}
                  </span>` : ''}
                  ${temperature ? `<span class="tag">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                    </svg>
                    ${temperature}
                  </span>` : ''}
                  <span class="tag">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M6.429 9.75 2.25 12l4.179 2.25m0-4.5 5.571 3 5.571-3m-11.142 0L2.25 7.5 12 2.25l9.75 5.25-4.179 2.25m0 0L12 12.75l-5.571-3m11.142 0 4.179 2.25L12 17.25l-9.75-5.25 4.179-2.25" />
                    </svg>
                    ${displayCap} ${unit}
                  </span>
                </div>
              </div>
              <div class="card-meta">
                <div>
                  <div class="card-capacity"><strong>${displayCap}</strong> <span>/${unit}</span></div>
                  <div class="capacity-label">available capacity</div>
                </div>
                <button class="view-details-btn" onclick="alert('Details for ${name}')">
                  View details
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
                  </svg>
                </button>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function applySortAndRender() {
      applyFilters();
    }

    // ── Expose functions to inline HTML handlers ──
    window.updateUnit = updateUnit;
    window.toggleFilter = toggleFilter;
    window.applyFilters = applyFilters;
    window.resetFilters = resetFilters;
    window.applySortAndRender = applySortAndRender;

    // ── Search Form Submission ──
    document.getElementById('warehouseSearchForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const location = document.getElementById('location').value;
      const storageType = document.getElementById('storageType').value;
      const areaValue = document.getElementById('areaValue').value;

      if (storageType && !areaValue) {
        alert('Please enter the required ' + (VALIDATION_LABELS[storageType] || 'value') + '.');
        document.getElementById('areaValue').focus();
        return;
      }

      const value = areaValue ? parseFloat(areaValue) : null;
      currentStorageType = storageType || 'SQFT';

      const locationLabel = document.getElementById('location').selectedOptions[0].text;
      document.getElementById('resultsTitle').textContent = `${locationLabel}: Top picks for you`;

      const searchBtn = document.getElementById('searchBtn');
      searchBtn.classList.add('loading');
      resetFilters();
      showLoading();

      try {
        const warehouses = await searchByLocation(location);
        currentResults = filterByCapacity(warehouses, currentStorageType, value);
        applySortAndRender();
      } catch (error) {
        console.error('Search failed:', error);
        document.getElementById('warehouseList').innerHTML = `
          <div class="empty-state">
            <p>Something went wrong. Please try again.</p>
            <p style="font-size:0.75rem;color:#9ca3af;margin-top:0.5rem;">${error.message}</p>
          </div>`;
      } finally {
        searchBtn.classList.remove('loading');
      }
    });
  </script>

</body>
</html>
